<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Files</title>
</head>
<body>
    <h1>Upload GO Data Files</h1>

    <form method="post" enctype="multipart/form-data">
        <div>
            <label>Upload OBO file:</label>
            <input type="file" name="obo_file">
        </div>

        <br>

        <div>
            <label>Upload GAF file:</label>
            <input type="file" name="gaf_file">
        </div>

        <br>

        <button type="submit">Upload</button>
    </form>

    {% if message %}
        <p><strong>{{ message }}</strong></p>
    {% endif %}

    <br>
    <a href="/">Back to Home</a>
</body>
</html>
